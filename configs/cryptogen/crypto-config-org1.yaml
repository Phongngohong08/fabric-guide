# Cấu hình sinh certificates cho Org1 (Peer Organization)
#
# Dùng với lệnh:
#   cryptogen generate --config=crypto-config-org1.yaml --output=../../organizations
#
# Kết quả: organizations/peerOrganizations/org1.example.com/

PeerOrgs:
  - Name: Org1                      # Tên tổ chức → MSP ID sẽ là "Org1MSP"
    Domain: org1.example.com        # Domain → hostname peers: peer0.org1.example.com
    EnableNodeOUs: true             # Phân biệt role bằng OU (peer/client/admin)
                                    # Cần có file config.yaml trong MSP

    # Tạo peers tự động theo pattern: peer0, peer1, ...
    Template:
      Count: 1                      # Số lượng peers (tạo peer0.org1.example.com)

    # Users: Admin luôn được tạo tự động
    # Count ở đây là số user thường ngoài Admin
    Users:
      Count: 1                      # Tạo User1@org1.example.com
